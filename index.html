<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg?v=2" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#f7f3ea" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <script>
      (() => {
        let path = window.location.pathname.replace(/\/+$/, '') || '/'

        if (path === '/') {
          const mobileHint = navigator.userAgentData?.mobile
          const phone =
            mobileHint === true ||
            (mobileHint === undefined &&
              /Android.*Mobile|iPhone|iPod|IEMobile|Windows Phone|webOS|BlackBerry|Opera Mini|Mobi/i.test(
                navigator.userAgent,
              ))

          path = phone ? '/card' : '/originals'
        }

        const color = path === '/card' ? '#f7f3ea' : '#f7f3ea'

        document.documentElement.style.setProperty(
          '--app-boot-background',
          color,
        )
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute('content', color)
      })()
    </script>
    <style>
      #app-boot {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: grid;
        place-items: center;
        background: var(--app-boot-background, #f7f3ea);
        transition: opacity 360ms ease;
      }
      #app-boot::after {
        width: 18px;
        aspect-ratio: 1;
        border: 1.5px solid #cdd5c8;
        border-top-color: #3f513f;
        border-radius: 50%;
        animation: app-boot-spin 700ms linear infinite;
        content: '';
      }
      [data-app-ready] #app-boot {
        opacity: 0;
        pointer-events: none;
      }
      @keyframes app-boot-spin {
        to {
          transform: rotate(1turn);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-boot {
          transition-duration: 0.01ms;
        }
        #app-boot::after {
          animation: none;
        }
      }
    </style>
    <title>Tamila Dubas</title>
  </head>
  <body>
    <div id="app-boot" role="status" aria-label="Loading"></div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
